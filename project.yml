name: EvoVoiceChat
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: N3G45G5H74
    ALWAYS_SEARCH_USER_PATHS: NO
    SWIFT_OPTIMIZATION_LEVEL: -Onone
targets:
  EvoVoiceChat:
    type: application
    platform: iOS
    sources:
      - path: ios/EvoVoiceChat
    resources:
      - path: ios/EvoVoiceChat/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linyibin8.evovoicechat
        PRODUCT_NAME: EvoVoiceChat
        INFOPLIST_FILE: ios/EvoVoiceChat/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ALWAYS_SEARCH_USER_PATHS: NO
